<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌词提取器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 400px;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(102, 126, 234, 0.2) 0%, transparent 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .header p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .content {
            padding: 16px;
        }
        
        .song-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        .song-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .song-cover {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .song-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .song-cover svg {
            width: 24px;
            height: 24px;
            fill: rgba(255, 255, 255, 0.3);
        }
        
        .song-info {
            flex: 1;
            overflow: hidden;
        }
        
        .song-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .song-artist {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .lyrics-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
        }
        
        .status-dot.empty {
            background: #e74c3c;
        }
        
        .status-dot.loading {
            background: #f39c12;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .options-section {
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .option-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .option-item:last-child {
            border-bottom: none;
        }
        
        .option-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 22px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #667eea;
        }
        
        input:checked + .slider:before {
            transform: translateX(18px);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 16px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        
        .message.success {
            display: block;
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        
        .message.error {
            display: block;
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        
        .message.info {
            display: block;
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }
        
        .footer {
            padding: 12px 16px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24">
                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
            </svg>
        </div>
        <h1>歌词提取器</h1>
        <p>提取当前播放歌曲的歌词</p>
    </div>
    
    <div class="content">
        <div class="song-card">
            <div class="song-card-header">
                <div class="song-cover" id="song-cover">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
                <div class="song-info">
                    <div class="song-name" id="song-name">-</div>
                    <div class="song-artist" id="song-artist">-</div>
                </div>
            </div>
            <div class="lyrics-status">
                <span class="status-dot loading" id="status-dot"></span>
                <span id="status-text">正在获取...</span>
            </div>
        </div>
        
        <div class="options-section">
            <div class="section-title">导出选项</div>
            <div class="option-item">
                <span class="option-label">包含时间戳</span>
                <label class="switch">
                    <input type="checkbox" id="option-timestamp">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="option-item">
                <span class="option-label">包含翻译歌词</span>
                <label class="switch">
                    <input type="checkbox" id="option-translation" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-secondary" id="refresh-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                刷新
            </button>
            <button class="btn btn-primary" id="download-btn" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                下载歌词
            </button>
        </div>
        
        <div class="message" id="message"></div>
    </div>
    
    <div class="footer">
        MoeKoe 歌词提取器 v1.0.0
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
